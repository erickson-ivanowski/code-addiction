<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" fill="none">
  <style>
    .cat-label { fill: #e8e8e8; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
    .cat-line { stroke: #222; stroke-width: 1; }
    .cmd-box { fill: #111; stroke: #222; stroke-width: 1; rx: 6; }
    .cmd-name { fill: #00ff88; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
    .cmd-desc { fill: #999; font-family: 'Outfit', sans-serif; font-size: 9px; }
    .group-bg { fill: #0a0a0a; stroke: #1a1a1a; stroke-width: 1; rx: 10; }
    .group-title { fill: #e8e8e8; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.08em; }
  </style>

  <!-- DISCOVERY GROUP -->
  <rect x="20" y="10" width="310" height="200" class="group-bg"/>
  <text x="40" y="36" class="group-title">DISCOVERY</text>
  <line x1="40" y1="44" x2="310" y2="44" class="cat-line"/>

  <rect x="40" y="56" width="270" height="36" class="cmd-box"/>
  <text x="56" y="74" class="cmd-name">/add.brainstorm</text>
  <text x="56" y="86" class="cmd-desc">Explore ideas (read-only)</text>

  <rect x="40" y="100" width="270" height="36" class="cmd-box"/>
