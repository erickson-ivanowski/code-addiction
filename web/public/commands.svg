<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" fill="none">
  <style>
    .cat-label { fill: #e8e8e8; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
    .cat-line { stroke: #222; stroke-width: 1; }
    .cmd-box { fill: #111; stroke: #222; stroke-width: 1; rx: 6; }
    .cmd-name { fill: #00ff88; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }
    .cmd-desc { fill: #999; font-family: 'Outfit', sans-serif; font-size: 9px; }
    .group-bg { fill: #0a0a0a; stroke: #1a1a1a; stroke-width: 1; rx: 10; }
    .group-title { fill: #e8e8e8; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.08em; }
  </style>

  <!-- DISCOVERY GROUP -->
  <rect x="20" y="10" width="310" height="240" class="group-bg"/>
  <text x="40" y="36" class="group-title">DISCOVERY</text>
  <line x1="40" y1="44" x2="310" y2="44" class="cat-line"/>

  <rect x="40" y="56" width="270" height="36" class="cmd-box"/>
  <text x="56" y="74" class="cmd-name">/add-brainstorm</text>
  <text x="56" y="86" class="cmd-desc">Explore ideas (read-only)</text>

  <rect x="40" y="100" width="270" height="36" class="cmd-box"/>
  <text x="56" y="118" class="cmd-name">/add-feature</text>
  <text x="56" y="130" class="cmd-desc">AI-guided feature discovery → about.md</text>

  <rect x="40" y="144" width="270" height="36" class="cmd-box"/>
  <text x="56" y="162" class="cmd-name">/add-init</text>
  <text x="56" y="174" class="cmd-desc">Project onboarding → owner.md</text>

  <rect x="40" y="188" width="270" height="36" class="cmd-box"/>
  <text x="56" y="206" class="cmd-name">/add-architecture-analyzer</text>
  <text x="56" y="218" class="cmd-desc">Map architecture, classify apps</text>

  <!-- PLANNING GROUP -->
  <rect x="350" y="10" width="310" height="150" class="group-bg"/>
  <text x="370" y="36" class="group-title">PLANNING</text>
  <line x1="370" y1="44" x2="640" y2="44" class="cat-line"/>

  <rect x="370" y="56" width="270" height="36" class="cmd-box"/>
  <text x="386" y="74" class="cmd-name">/add-design</text>
  <text x="386" y="86" class="cmd-desc">UX spec, mobile-first</text>

  <rect x="370" y="100" width="270" height="36" class="cmd-box"/>
  <text x="386" y="118" class="cmd-name">/add-plan</text>
  <text x="386" y="130" class="cmd-desc">Technical planning → plan.md</text>

  <!-- IMPLEMENTATION GROUP -->
  <rect x="350" y="174" width="310" height="150" class="group-bg"/>
  <text x="370" y="200" class="group-title">IMPLEMENTATION</text>
  <line x1="370" y1="208" x2="640" y2="208" class="cat-line"/>

  <rect x="370" y="220" width="270" height="36" class="cmd-box"/>
  <text x="386" y="238" class="cmd-name">/add-dev</text>
  <text x="386" y="250" class="cmd-desc">Subagent-driven implementation</text>

  <rect x="370" y="264" width="270" height="36" class="cmd-box"/>
  <text x="386" y="282" class="cmd-name">/add-autopilot</text>
  <text x="386" y="294" class="cmd-desc">Full autonomous implementation</text>

  <!-- QUALITY GROUP -->
  <rect x="680" y="10" width="300" height="150" class="group-bg"/>
  <text x="700" y="36" class="group-title">QUALITY</text>
  <line x1="700" y1="44" x2="960" y2="44" class="cat-line"/>

  <rect x="700" y="56" width="260" height="36" class="cmd-box"/>
  <text x="716" y="74" class="cmd-name">/add-review</text>
  <text x="716" y="86" class="cmd-desc">Code review + auto-correction</text>

  <rect x="700" y="100" width="260" height="36" class="cmd-box"/>
  <text x="716" y="118" class="cmd-name">/add-test</text>
  <text x="716" y="130" class="cmd-desc">Generate tests (80% coverage target)</text>

  <!-- DELIVERY GROUP -->
  <rect x="680" y="174" width="300" height="150" class="group-bg"/>
  <text x="700" y="200" class="group-title">DELIVERY</text>
  <line x1="700" y1="208" x2="960" y2="208" class="cat-line"/>

  <rect x="700" y="220" width="260" height="36" class="cmd-box"/>
  <text x="716" y="238" class="cmd-name">/add-done</text>
  <text x="716" y="250" class="cmd-desc">Changelog, docs, finalize</text>

  <rect x="700" y="264" width="260" height="36" class="cmd-box"/>
  <text x="716" y="282" class="cmd-name">/add-pr</text>
  <text x="716" y="294" class="cmd-desc">Create PR for code review</text>

  <!-- UTILITY GROUP -->
  <rect x="20" y="264" width="310" height="240" class="group-bg"/>
  <text x="40" y="290" class="group-title">UTILITIES</text>
  <line x1="40" y1="298" x2="310" y2="298" class="cat-line"/>

  <rect x="40" y="310" width="270" height="36" class="cmd-box"/>
  <text x="56" y="328" class="cmd-name">/add</text>
  <text x="56" y="340" class="cmd-desc">Smart gateway — answers questions, guides flow</text>

  <rect x="40" y="354" width="270" height="36" class="cmd-box"/>
  <text x="56" y="372" class="cmd-name">/add-audit</text>
  <text x="56" y="384" class="cmd-desc">Full project health analysis</text>

  <rect x="40" y="398" width="270" height="36" class="cmd-box"/>
  <text x="56" y="416" class="cmd-name">/add-hotfix</text>
  <text x="56" y="428" class="cmd-desc">Emergency fix with global ID</text>

  <rect x="40" y="442" width="270" height="36" class="cmd-box"/>
  <text x="56" y="460" class="cmd-name">/add-copy</text>
  <text x="56" y="472" class="cmd-desc">SaaS copy generator</text>

  <!-- EXTRAS in delivery area -->
  <rect x="370" y="338" width="270" height="36" class="cmd-box"/>
  <text x="386" y="356" class="cmd-name">/add-landing</text>
  <text x="386" y="368" class="cmd-desc">High-conversion SaaS landing page builder</text>

  <rect x="370" y="382" width="270" height="36" class="cmd-box"/>
  <text x="386" y="400" class="cmd-name">/add-ux</text>
  <text x="386" y="412" class="cmd-desc">Quick UX — loads ux-design for free context</text>
</svg>
