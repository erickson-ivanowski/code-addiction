name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for CLI changes
        id: cli_changes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$PREV_TAG"..HEAD -- cli/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in cli/ since $PREV_TAG — skipping publish"
          fi
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        if: steps.cli_changes.outputs.changed == 'true'
        run: npm ci

      - name: Run tests
        if: steps.cli_changes.outputs.changed == 'true'
        run: npm test

      - name: Build framework
        working-directory: .
        run: node scripts/build.js

      - name: Package framework zip
        working-directory: .
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIRS=""
          for subdir in .codeadd/scripts .codeadd/fragments .codeadd/templates .agent .agents .augment .bob .claude .cursor .gemini .github .kilocode .kiro .opencode .qwen .roo .shai .windsurf; do
            [ -d "framwork/$subdir" ] && DIRS="$DIRS framwork/$subdir"
          done
          zip -r "code-addiction-${TAG}.zip" $DIRS
          echo "ASSET_NAME=code-addiction-${TAG}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload asset
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          NOTES=$(git tag -l --format='%(contents)' "$TAG")
          if [ -n "$NOTES" ]; then
            echo "$NOTES" > /tmp/release-notes.md
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              "${{ env.ASSET_NAME }}"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              "${{ env.ASSET_NAME }}"
          fi

      - name: Publish to npm
        if: steps.cli_changes.outputs.changed == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
